# render.yaml — Render deployment configuration
# Docs: https://render.com/docs/infrastructure-as-code
#
# Backend uses Supabase Postgres so no local disk is required.

services:
  - type: web
    name: budget-buddy-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # The following secrets must be set in the Render dashboard
      # (Environment → Secret Files or Environment Variables):
      #
      #   PORT                    — Render sets this automatically; leave unset
      #   FIREBASE_PROJECT_ID
      #   FIREBASE_PRIVATE_KEY_ID
      #   FIREBASE_PRIVATE_KEY    — full PEM, keep the \n escapes
      #   FIREBASE_CLIENT_EMAIL
      #   FIREBASE_CLIENT_ID
      #   CORS_ORIGIN             — e.g. https://budgetbuddy1.vercel.app
      #   FRONTEND_URL            — e.g. https://budgetbuddy1.vercel.app
      #   PHONE_EMAIL_CLIENT_SECRET
